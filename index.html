<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LUMINAI@SCO</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      margin:0;
      padding:0;
      font-family: Arial, sans-serif;
      background:#0f172a;
      color:white;
    }

    .hero{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
      background:linear-gradient(135deg,#7c3aed,#ea580c);
    }

    .card{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:20px;
      padding:20px;
      margin-top:20px;
      width:100%;
      max-width:400px;
      backdrop-filter:blur(10px);
    }

    button{
      border:none;
      border-radius:12px;
      padding:12px 20px;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
    }

    .btn1{
      background:#f97316;
      color:white;
      width:100%;
    }

    .btn2{
      background:#7c3aed;
      color:white;
      width:100%;
    }

    .feature{
      background:rgba(255,255,255,0.07);
      padding:14px;
      border-radius:14px;
      margin-top:10px;
    }

    .subject{
      background:white;
      color:black;
      border-radius:14px;
      padding:15px;
      margin-top:12px;
      font-weight:bold;
    }

    .footer{
      margin-top:30px;
      opacity:0.7;
      font-size:12px;
    }
  </style>
</head>

<body>

<div class="hero">

  <div style="font-size:70px;">🎓</div>

  <h1 style="font-size:40px;font-weight:900;margin:10px 0;">
    LUMINAI@SCO
  </h1>

  <p style="font-size:18px;opacity:0.9;">
    AI Powered Smart Learning App
  </p>

  <div class="card">

    <h2 style="margin-top:0;">🚀 Features</h2>

    <div class="feature">🤖 AI Tutor</div>
    <div class="feature">📚 NCERT Notes</div>
    <div class="feature">🎬 Animations</div>
    <div class="feature">🧠 Mnemonics</div>
    <div class="feature">📝 Quiz & MCQ</div>
    <div class="feature">🎵 Audio Learning</div>
    <div class="feature">📈 Performance Analytics</div>
    <div class="feature">🌙 Dark Mode</div>

    <button class="btn1" onclick="showSubjects()">
      Start Learning
    </button>

    <button class="btn2" onclick="alert('AI Tutor Coming Soon 🚀')">
      Ask AI Tutor
    </button>

  </div>

  <div id="subjects" class="card" style="display:none;">

    <h2>📖 Subjects</h2>

    <div class="subject">⚡ Physics</div>
    <div class="subject">🧪 Chemistry</div>
    <div class="subject">📐 Mathematics</div>
    <div class="subject">🌍 Geography</div>
    <div class="subject">🏛 History</div>
    <div class="subject">🧬 Biology</div>

  </div>

  <div class="footer">
    Made with ❤️ by Satish Chandra Ojha
  </div>

</div>

<script>

function showSubjects(){
  document.getElementById("subjects").style.display = "block";
  window.scrollTo({
    top:document.body.scrollHeight,
    behavior:"smooth"
  });
}

</script>

</body>
</html>
