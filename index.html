<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LUMINAI@SCO</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#7c3aed"/>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#7c3aed,#ff6b6b);
color:white;
}

.container{
padding:20px;
max-width:450px;
margin:auto;
text-align:center;
}

.logo{
font-size:70px;
margin-top:20px;
}

h1{
font-size:42px;
margin:10px 0;
}

.card{
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:25px;
backdrop-filter:blur(10px);
margin-top:20px;
}

.btn{
display:block;
background:white;
color:black;
padding:18px;
margin:12px 0;
border-radius:16px;
font-size:20px;
font-weight:bold;
text-decoration:none;
}

.orange{
background:#ff6b00;
color:white;
}

.purple{
background:#7c3aed;
color:white;
}

select{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:18px;
margin-top:15px;
}

.subject{
background:white;
color:black;
padding:18px;
border-radius:18px;
margin:12px 0;
font-weight:bold;
font-size:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">🎓</div>

<h1>LUMINAI@SCO</h1>

<p>AI Powered Smart Learning App</p>

<div class="card">

<h2>🎯 Select Class</h2>

<select>
<option>Class 6</option>
<option>Class 7</option>
<option>Class 8</option>
<option>Class 9</option>
<option selected>Class 10</option>
<option>Class 11</option>
<option>Class 12</option>
</select>

<a class="btn orange">🚀 Start Learning</a>

<a class="btn purple">🤖 Ask AI Tutor</a>

</div>

<div class="card">

<h2>📚 Subjects</h2>

<div class="subject">⚡ Physics</div>

<div class="subject">🧪 Chemistry</div>

<div class="subject">📐 Mathematics</div>

<div class="subject">🌍 Geography</div>

<div class="subject">🏛️ History</div>

<div class="subject">🧬 Biology</div>

</div>

<p style="margin-top:30px;">
Made with ❤️ by Satish Chandra Ojha
</p>

</div>

</body>
</html>
